<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"><title>登录</title><link rel="stylesheet" href="__STATIC__/libs/layui/css/layui.css?v={:sys_config('static_version',date('md'))}"/><link rel="stylesheet" href="__STATIC__/admin/css/base.css?v={:sys_config('static_version',date('md'))}"/><link rel="stylesheet" href="__STATIC__/admin/css/login.css?v={:sys_config('static_version',date('md'))}"/><script>
        if (window.self != window.top) {
            top.location.reload();
        }
        window.APP_CONFIG = {
            staticVersion: '{:sys_config("static_version", date("md"))}'
        };
    </script></head><body><div class="login"><div class="login-bg"> <img src="__STATIC__/admin/svg/login_bg.svg?v={:sys_config('static_version',date('md'))}"></img></div><div class="login-container"> {notempty name=":sys_config('square_logo')"}<div class="logo"> <img src="{:sys_config('square_logo')}" alt="login"></div> {/notempty}<div class="title">{:sys_config('site_name','管理后台')}登录</div><form class="layui-form"><div class="layui-form-item"><div class="layui-input-wrap"><div class="layui-input-prefix"><i class="layui-icon layui-icon-username"></i></div> <input type="text" name="username" value="" lay-verify="required" placeholder="用户名" lay-reqtext="请填写用户名" autocomplete="off" class="layui-input" lay-affix="clear"></div></div><div class="layui-form-item"><div class="layui-input-wrap"><div class="layui-input-prefix"><i class="layui-icon layui-icon-password"></i></div> <input type="password" name="password" value="" lay-verify="required" placeholder="密   码" lay-reqtext="请填写密码" autocomplete="off" class="layui-input" lay-affix="eye"></div></div><div class="layui-form-item"><hr></div><div class="layui-form-item"> <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="login">立即登录</button></div></form><div class="layui-form-item"> <button class="layui-btn layui-btn-fluid layui-btn-primary" id="back">返回首页</button></div></div></div><script src="__STATIC__/libs/layui/layui.js?v={:sys_config('static_version',date('md'))}"></script><script src="__STATIC__/admin/js/common.js?v={:sys_config('static_version',date('md'))}"></script><script>
    layui.use(['form', 'popup', 'jquery', 'encrypt'], function () {
        let form = layui.form;
        let $ = layui.jquery;
        let encrypt = layui.encrypt;
        let layer = layui.layer;
        // 登 录 提 交
        form.on('submit(login)', function (data) {
            $.ajax({
                type: "POST",
                url: "{:urls()}",
                data: {
                    username: data.field.username,
                    password: encrypt.md5(data.field.password),
                },
                dataType: "json",
                success: function (data) {
                    if (data.code === 1) {
                        layer.msg("登录成功", function () {
                            location.href = data.url
                        });
                    } else {
                        layer.msg(data.msg)
                    }
                }
            })
            return false;
        });
        $("#back").on('click', function () {
            location.href = "{:hurl('index/index/index')}"
        })
    })
</script></body></html>
